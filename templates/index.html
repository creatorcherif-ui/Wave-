<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wave - Créer un compte</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px 24px calc(16px + env(safe-area-inset-bottom));
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            padding-top: 5px;
            height: 48px;
            flex-shrink: 0;
        }

        .back-arrow {
            cursor: pointer;
            margin-right: 20px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111111;
        }

        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .wave-logo-box {
            width: 90px;
            height: 90px;
            background-color: #39bcf4;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 14px rgba(57, 188, 244, 0.35);
        }

        .instruction-text {
            text-align: center;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.35;
            color: #000000;
            padding: 0 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .input-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: auto;
            padding-top: 5px;
            flex-shrink: 0;
        }

        .country-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            font-weight: 500;
            border-bottom: 2px solid #39bcf4;
            padding-bottom: 6px;
            cursor: pointer;
        }

        .country-flag { font-size: 24px; }
        .arrow-down { font-size: 10px; color: #888888; margin-left: 2px; }

        .phone-input-wrapper {
            flex-grow: 1;
            max-width: 220px;
        }

        .phone-display {
            width: 100%;
            font-size: 22px;
            font-weight: 500;
            color: #000000;
            border: none;
            border-bottom: 2px solid #39bcf4;
            padding-bottom: 6px;
            letter-spacing: 1px;
            outline: none;
            background: transparent;
        }

        .phone-display::placeholder { color: #D0D0D0; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 15px;
            width: 100%;
            flex-shrink: 0;
        }

        .key {
            background: none;
            border: none;
            font-size: 28px;
            font-weight: 400;
            color: #111111;
            padding: 10px 0;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            height: 52px;
            transition: background 0.15s;
        }

        .key:active { background-color: #F5F5F5; }
        .key.delete-btn { font-size: 24px; color: #333333; }

        .submit-section {
            width: 100%;
            padding-bottom: 5px;
            flex-shrink: 0;
        }

        .btn-suivant {
            width: 100%;
            background-color: #B2EBF2;
            color: #FFFFFF;
            border: none;
            border-radius: 30px;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            cursor: not-allowed;
            text-align: center;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .btn-suivant.active {
            background-color: #39bcf4;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(57, 188, 244, 0.35);
        }

        /* Pop-up géolocalisation */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .system-popup {
            width: 100%;
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            padding: 20px 24px 30px 24px;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.15, 0.85, 0.35, 1);
            text-align: center;
        }

        .system-popup.show { transform: translateY(0); }

        .drag-handle {
            width: 36px; height: 4px;
            background-color: #E8E8E8;
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }

        .popup-icon {
            width: 48px; height: 48px;
            background-color: #E0F7FA;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 12px auto;
        }

        .popup-title {
            font-size: 17px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 8px;
        }

        .popup-message {
            font-size: 13.5px;
            color: #555555;
            line-height: 1.45;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .popup-buttons { display: flex; gap: 12px; }

        .btn-cancel {
            flex: 1;
            background-color: #F5F5F5;
            color: #555555;
            border: none;
            border-radius: 25px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirm {
            flex: 1;
            background-color: #39bcf4;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(57, 188, 244, 0.2);
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- En-tête -->
    <div class="header">
        <div class="back-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </div>
        <h1>Créer un compte</h1>
    </div>

    <!-- Logo Wave officiel -->
    <div class="logo-section">
        <div class="wave-logo-box">
            <svg width="64" height="64" viewBox="0 0 100 115" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Tête noire -->
                <circle cx="50" cy="28" r="20" fill="#111111"/>
                <!-- Corps noir -->
                <ellipse cx="50" cy="70" rx="25" ry="32" fill="#111111"/>
                <!-- Ventre blanc -->
                <ellipse cx="50" cy="74" rx="16" ry="24" fill="#ffffff"/>
                <!-- Face blanche (joues) -->
                <ellipse cx="50" cy="30" rx="13" ry="14" fill="#ffffff"/>
                <!-- Yeux noirs -->
                <circle cx="43" cy="24" r="4.5" fill="#111111"/>
                <circle cx="57" cy="24" r="4.5" fill="#111111"/>
                <!-- Reflets yeux -->
                <circle cx="44.5" cy="22.5" r="1.8" fill="#ffffff"/>
                <circle cx="58.5" cy="22.5" r="1.8" fill="#ffffff"/>
                <!-- Bec orange -->
                <path d="M 44 33 Q 50 39 56 33 Q 50 37 44 33 Z" fill="#FF8C00"/>
                <ellipse cx="50" cy="33" rx="6" ry="3" fill="#FF8C00"/>
                <!-- Bras gauche levé (bras en l'air comme sur l'image) -->
                <path d="M 27 60 C 15 50 8 33 15 22 C 20 14 29 20 31 32 C 33 41 31 52 27 60 Z" fill="#111111"/>
                <!-- Bras droit au repos vers le bas -->
                <path d="M 73 60 C 82 64 88 76 85 85 C 81 85 76 72 73 60 Z" fill="#111111"/>
                <!-- Pieds orange -->
                <ellipse cx="40" cy="100" rx="11" ry="5.5" fill="#FF8C00"/>
                <ellipse cx="61" cy="100" rx="11" ry="5.5" fill="#FF8C00"/>
            </svg>
        </div>
    </div>

    <!-- Texte d'instruction -->
    <div class="instruction-text">
        Inscrivez-vous pour devenir un assistant Wave
    </div>

    <!-- Saisie du numéro de téléphone -->
    <div class="input-section">
        <div class="country-selector">
            <span class="country-flag">🇸🇳</span>
            <span>+221</span>
            <span class="arrow-down">▼</span>
        </div>
        <div class="phone-input-wrapper">
            <input type="text" id="phoneDisplay" class="phone-display" placeholder="77 777 77 77" readonly>
        </div>
    </div>

    <!-- Clavier numérique -->
    <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <div class="key"></div>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key delete-btn" onclick="pressDelete()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                <line x1="18" y1="9" x2="12" y2="15"></line>
                <line x1="12" y1="9" x2="18" y2="15"></line>
            </svg>
        </button>
    </div>

    <!-- Bouton Suivant -->
    <div class="submit-section">
        <button id="btnSuivant" class="btn-suivant" disabled onclick="finaliserInscription()">Suivant</button>
    </div>

    <!-- Pop-up géolocalisation (demande UNE seule fois) -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="systemPopup" class="system-popup">
            <div class="drag-handle"></div>
            <div class="popup-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#39bcf4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
            </div>
            <div class="popup-title">« Wave » souhaite utiliser votre position</div>
            <div class="popup-message">
                Nous utilisons votre position géographique pour valider votre secteur d'activité en tant qu'assistant Wave.
            </div>
            <div class="popup-buttons">
                <button class="btn-cancel" onclick="fermerPopupSysteme()">Refuser</button>
                <button class="btn-confirm" onclick="demanderPositionReelle()">Autoriser</button>
            </div>
        </div>
    </div>

</div>

<script>
    let rawNumber = "";

    // Pop-up s'ouvre UNE seule fois au chargement
    window.onload = function() {
        setTimeout(ouvrirPopupSysteme, 650);
    };

    function ouvrirPopupSysteme() {
        const overlay = document.getElementById("modalOverlay");
        const popup = document.getElementById("systemPopup");
        overlay.style.display = "flex";
        setTimeout(() => popup.classList.add("show"), 50);
    }

    function fermerPopupSysteme() {
        const overlay = document.getElementById("modalOverlay");
        const popup = document.getElementById("systemPopup");
        popup.classList.remove("show");
        setTimeout(() => overlay.style.display = "none", 300);
    }

    // Demande de position — une seule fois, l'utilisateur peut refuser librement
    function demanderPositionReelle() {
        fermerPopupSysteme();
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    console.log("Position obtenue.");
                },
                function(error) {
                    console.warn("Géolocalisation refusée ou indisponible.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    }

    function pressKey(num) {
        if (rawNumber.length < 9) {
            rawNumber += num;
            formatAndDisplay();
        }
    }

    function pressDelete() {
        if (rawNumber.length > 0) {
            rawNumber = rawNumber.slice(0, -1);
            formatAndDisplay();
        }
    }

    function formatAndDisplay() {
        let displayStr = "";
        for (let i = 0; i < rawNumber.length; i++) {
            if (i === 2 || i === 5 || i === 7) displayStr += " ";
            displayStr += rawNumber[i];
        }
        document.getElementById("phoneDisplay").value = displayStr;
        const btn = document.getElementById("btnSuivant");
        if (rawNumber.length === 9) {
            btn.classList.add("active");
            btn.disabled = false;
        } else {
            btn.classList.remove("active");
            btn.disabled = true;
        }
    }

    function finaliserInscription() {
        if (rawNumber.length !== 9) return;
        // Redirection vers WhatsApp Wave après inscription
        window.location.href = "https://wa.me/votre_numero_wave";
    }
</script>

</body>
</html>
