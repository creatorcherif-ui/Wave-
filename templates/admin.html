<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Admin - Suivi des Assistants</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* BARRE DE NAVIGATION */
        .navbar {
            background-color: #39bcf4;
            color: white;
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .navbar h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .btn-refresh {
            background-color: white;
            color: #39bcf4;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-refresh:hover {
            background-color: #e0f7fa;
        }

        /* LAYOUT PRINCIPAL SPLIT (Carte en haut/gauche, Tableau en bas/droite) */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
        }

        /* ZONE DU TABLEAU DES INSCRITS */
        .table-section {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
        }

        .table-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: #39bcf4;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #666;
        }

        tr:hover {
            background-color: #fcfcfc;
        }

        .btn-maps {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ZONE DE LA CARTE TEMPS RÉEL */
        .map-section {
            flex: 1.2;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>Wave Assistant — Panneau de Contrôle Administrateur</h1>
        <button class="btn-refresh" onclick="window.location.reload()">🔄 Actualiser</button>
    </div>

    <div class="main-container">
        
        <div class="table-section">
            <h2>
                Liste des candidats 
                <span class="badge-count">{{ candidats|length }} inscrits</span>
            </h2>
            
            <table>
                <thead>
                    <tr>
                        <th>Téléphone</th>
                        <th>Date d'inscription</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in candidats %}
                    <tr>
                        <td style="font-weight: 600; color: #111;">{{ c.telephone }}</td>
                        <td style="color: #666;">{{ c.date }}</td>
                        <td>
                            <a href="https://www.google.com/maps/search/?api=1&query={{ c.latitude }},{{ c.longitude }}" target="_blank" class="btn-maps">
                                Itinéraire G Maps
                            </a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" style="text-align: center; color: #999; padding: 40px 0;">
                            Aucun candidat inscrit pour le moment.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>

    <script>
        // 1. Initialisation de la carte (Centrée par défaut sur le Sénégal / Dakar)
        // Coordonnées de base : Latitude 14.7167, Longitude -17.4677, Zoom 12
        var map = L.map('map').setView([14.7167, -17.4677], 12);

        // 2. Chargement des textures visuelles de la carte (OpenStreetMap de qualité supérieure)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Conteneur pour regrouper tous nos pins et pouvoir zoomer automatiquement dessus
        var markerGroup = new L.featureGroup();

        // 3. Boucle Jinja2 : Python injecte dynamiquement chaque candidat sous forme de marqueur JavaScript
        {% for c in candidats %}
            if ({{ c.latitude }} !== null && {{ c.longitude }} !== null) {
                // Créer un marqueur pour ce candidat
                var marker = L.marker([{{ c.latitude }}, {{ c.longitude }}])
                    .bindPopup("<b>Téléphone : {{ c.telephone }}</b><br>Inscrit le : {{ c.date }}<br><br><a href='https://www.google.com/maps/search/?api=1&query={{ c.latitude }},{{ c.longitude }}' target='_blank'>Ouvrir dans Google Maps</a>");
                
                // Ajouter le marqueur au groupe
                markerGroup.addLayer(marker);
            }
        {% endfor %}

        // Ajouter le groupe complet de marqueurs sur la carte
        markerGroup.addTo(map);

        // Ajuster automatiquement le zoom de la carte pour afficher TOUS les candidats d'un coup
        if (markerGroup.getLayers().length > 0) {
            map.fitBounds(markerGroup.getBounds().pad(0.1));
        }
    </script>

</body>
</html>
